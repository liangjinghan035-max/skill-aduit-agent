<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Audit Agent — AI Security Scanner</title>
    <meta name="description" content="Scan GitHub AI skill repositories for security vulnerabilities with automated static analysis.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">Skill Audit</span>
                <span class="logo-badge">Agent</span>
            </div>
            <nav class="header-nav">
                <a href="https://github.com" target="_blank" class="nav-link">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    GitHub
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Hero Section -->
        <section class="hero" id="hero">
            <div class="hero-glow"></div>
            <h1 class="hero-title">
                <span class="hero-title-gradient">AI Skill</span> Security Scanner
            </h1>
            <p class="hero-subtitle">
                输入 GitHub 仓库地址，自动扫描 AI Skill 中的安全漏洞、恶意指令和供应链风险
            </p>

            <!-- Search Box -->
            <div class="search-container" id="search-container">
                <div class="search-box">
                    <div class="search-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="repo-input" 
                        class="search-input"
                        placeholder="例如: AgriciDaniel/claude-seo 或 https://github.com/owner/repo"
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="scan-btn" class="scan-btn" onclick="startAudit()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <span>扫描</span>
                    </button>
                </div>
                <div class="search-hint" id="search-hint"></div>
            </div>
        </section>

        <!-- Progress Section (hidden) -->
        <section class="progress-section" id="progress-section" style="display:none">
            <div class="progress-card">
                <div class="progress-header">
                    <div class="progress-title">
                        <div class="spinner"></div>
                        <span id="progress-text">正在分析...</span>
                    </div>
                    <span class="progress-pct" id="progress-pct">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="progress-log" id="progress-log"></div>
            </div>
        </section>

        <!-- Results Section (hidden) -->
        <section class="results-section" id="results-section" style="display:none">
            <!-- Summary Card -->
            <div class="result-header" id="result-header"></div>
            <!-- Report Content -->
            <div class="report-container" id="report-container"></div>
        </section>

        <!-- Cache Section -->
        <section class="cache-section" id="cache-section">
            <h2 class="section-title">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 8v4l3 3"/>
                    <circle cx="12" cy="12" r="10"/>
                </svg>
                已审计的仓库
            </h2>
            <div class="cache-grid" id="cache-grid">
                <div class="cache-loading">加载中...</div>
            </div>
        </section>
    </main>

    <!-- Markdown Renderer -->
    <script src="static/marked.min.js"></script>
    
    <script>
        // ============================================================
        // Background Animation
        // ============================================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random() * 0.3 + 0.05;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(99, 179, 237, ${this.alpha})`;
                ctx.fill();
            }
        }
        
        for (let i = 0; i < 60; i++) particles.push(new Particle());
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(99, 179, 237, ${0.03 * (1 - dist / 150)})`;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // ============================================================
        // Audit Logic
        // ============================================================
        
        const repoInput = document.getElementById('repo-input');
        const scanBtn = document.getElementById('scan-btn');
        const searchHint = document.getElementById('search-hint');
        const progressSection = document.getElementById('progress-section');
        const progressText = document.getElementById('progress-text');
        const progressPct = document.getElementById('progress-pct');
        const progressBar = document.getElementById('progress-bar');
        const progressLog = document.getElementById('progress-log');
        const resultsSection = document.getElementById('results-section');
        const resultHeader = document.getElementById('result-header');
        const reportContainer = document.getElementById('report-container');
        const cacheSection = document.getElementById('cache-section');
        const cacheGrid = document.getElementById('cache-grid');

        // Enter key support
        repoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') startAudit();
        });

        function startAudit() {
            const url = repoInput.value.trim();
            if (!url) {
                showHint('请输入 GitHub 仓库地址', 'error');
                return;
            }

            // Reset UI
            scanBtn.disabled = true;
            repoInput.disabled = true; // Lock input
            scanBtn.classList.add('loading');
            progressSection.style.display = 'block';
            resultsSection.style.display = 'none';
            reportContainer.innerHTML = '';
            resultHeader.innerHTML = '';
            progressLog.innerHTML = '';
            progressBar.style.width = '0%';
            progressText.textContent = '正在初始化...';
            progressPct.textContent = '0%';
            searchHint.textContent = '';

            // Smooth scroll to progress
            progressSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Use SSE for streaming progress
            fetch('api/audit/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url }),
            }).then(response => {
                if (!response.ok) {
                    return response.text().then(txt => {
                        throw new Error(`HTTP ${response.status}: ${txt}`);
                    });
                }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                async function readStream() {
                    try {
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) {
                                scanBtn.disabled = false;
                                scanBtn.classList.remove('loading');
                                break;
                            }

                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop(); // Keep incomplete line

                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    try {
                                        const msg = JSON.parse(line.slice(6));
                                        handleProgressMessage(msg);
                                    } catch (e) {
                                        console.warn('SSE parse error:', e, line);
                                    }
                                }
                            }
                        }
                    } catch (err) {
                        console.error('Stream read error:', err);
                        showHint(`流读取失败: ${err.message}`, 'error');
                        scanBtn.disabled = false;
                        repoInput.disabled = false;
                        scanBtn.classList.remove('loading');
                    }
                }
                readStream();
            }).catch(err => {
                showHint(`请求失败: ${err.message}`, 'error');
                scanBtn.disabled = false;
                repoInput.disabled = false;
                scanBtn.classList.remove('loading');
            });
        }

        function handleProgressMessage(msg) {
            if (msg.step === 'result') {
                // Final result
                progressSection.style.display = 'none';
                showReport(msg.data);
                scanBtn.disabled = false;
                repoInput.disabled = false; // Unlock
                scanBtn.classList.remove('loading');
                loadCache(); // Refresh cache list
                return;
            }

            if (msg.step === 'error') {
                showHint(msg.message, 'error');
                progressSection.style.display = 'none';
                scanBtn.disabled = false;
                repoInput.disabled = false; // Unlock
                scanBtn.classList.remove('loading');
                return;
            }

            // Progress update
            if (msg.message) {
                progressText.textContent = msg.message;
                addLog(msg.message, msg.step === 'cached' ? 'cache' : 'info');
            }
            if (msg.pct !== undefined) {
                progressBar.style.width = msg.pct + '%';
                progressPct.textContent = msg.pct + '%';
            }
        }

        function addLog(message, type = 'info') {
            const iconMap = {
                info: '🔍',
                cache: '⚡',
                done: '✅',
                error: '❌',
            };
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            div.innerHTML = `<span class="log-icon">${iconMap[type] || '•'}</span> ${escapeHtml(message)}`;
            progressLog.appendChild(div);
            progressLog.scrollTop = progressLog.scrollHeight;
        }

        function showReport(data) {
            resultsSection.style.display = 'block';
            
            const meta = data.meta || {};
            const risk = meta.overall_risk || 'UNKNOWN';
            const riskColors = {
                CRITICAL: { bg: '#2d1b1b', border: '#ef4444', text: '#fca5a5', icon: '🔴' },
                HIGH: { bg: '#2d2517', border: '#f97316', text: '#fdba74', icon: '🟠' },
                MEDIUM: { bg: '#2d2a17', border: '#eab308', text: '#fde047', icon: '🟡' },
                LOW: { bg: '#172d1f', border: '#22c55e', text: '#86efac', icon: '🔵' },
                SAFE: { bg: '#172d1f', border: '#22c55e', text: '#86efac', icon: '🟢' },
                UNKNOWN: { bg: '#1e1e2e', border: '#6b7280', text: '#9ca3af', icon: '⚪' },
                EMPTY_REPO: { bg: '#1a1a2e', border: '#6b7280', text: '#9ca3af', icon: 'ℹ️' },
            };
            const rc = riskColors[risk] || riskColors.UNKNOWN;

            const cachedBadge = data.cached 
                ? `<span class="badge badge-cache">⚡ 缓存命中</span>` 
                : `<span class="badge badge-fresh">🆕 新扫描</span>`;

            resultHeader.innerHTML = `
                <div class="result-summary" style="border-color: ${rc.border}; background: ${rc.bg}">
                    <div class="result-risk">
                        <span class="risk-icon">${rc.icon}</span>
                        <div>
                            <div class="risk-label">风险等级</div>
                            <div class="risk-value" style="color: ${rc.text}">${risk}</div>
                        </div>
                    </div>
                    <div class="result-stats">
                        <div class="stat">
                            <span class="stat-value">${meta.total_findings || 0}</span>
                            <span class="stat-label">发现</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">${meta.severity_counts?.CRITICAL || 0}</span>
                            <span class="stat-label">严重</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">${meta.severity_counts?.HIGH || 0}</span>
                            <span class="stat-label">高危</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">${Math.round((meta.overall_confidence || 0) * 100)}%</span>
                            <span class="stat-label">置信度</span>
                        </div>
                    </div>
                    <div class="result-meta">
                        ${cachedBadge}
                        <span class="meta-commit">Commit: ${data.commit || 'N/A'}</span>
                    </div>
                </div>
            `;

            // Render markdown report
            if (data.report_md) {
                try {
                    const html = (typeof marked !== 'undefined')
                        ? marked.parse(data.report_md)
                        : data.report_md.replace(/\n/g, '<br>');
                    reportContainer.innerHTML = `<div class="markdown-body">${html}</div>`;
                } catch (e) {
                    console.warn('Markdown render error:', e);
                    reportContainer.innerHTML = `<pre style="white-space:pre-wrap;color:#ccc">${data.report_md}</pre>`;
                }
            }

            // Scroll to results
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showHint(msg, type = 'info') {
            searchHint.textContent = msg;
            searchHint.className = `search-hint hint-${type}`;
            setTimeout(() => { searchHint.textContent = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // Cache List
        // ============================================================
        
        function loadCache() {
            fetch('api/cache')
                .then(r => r.json())
                .then(items => {
                    if (!items.length) {
                        cacheGrid.innerHTML = '<div class="cache-empty">暂无已审计的仓库。输入 GitHub 地址开始第一次扫描！</div>';
                        return;
                    }
                    cacheGrid.innerHTML = items.map(item => {
                        const riskIcons = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🔵', SAFE: '🟢' };
                        const icon = riskIcons[item.risk] || '⚪';
                        return `
                            <div class="cache-card" onclick="quickAudit('${item.owner}/${item.repo}')">
                                <div class="cache-card-header">
                                    <span class="cache-risk">${icon}</span>
                                    <span class="cache-risk-text">${item.risk}</span>
                                </div>
                                <div class="cache-repo">${item.owner}/<strong>${item.repo}</strong></div>
                                <div class="cache-meta">
                                    <span>${item.findings} 个发现</span>
                                    <span>commit ${item.commit}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                })
                .catch(() => {
                    cacheGrid.innerHTML = '<div class="cache-empty">加载缓存列表失败</div>';
                });
        }

        function quickAudit(repoPath) {
            repoInput.value = repoPath;
            document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => startAudit(), 300);
        }

        // Load cache on page load
        loadCache();
    </script>
</body>
</html>
